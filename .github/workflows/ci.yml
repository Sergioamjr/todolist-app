name: CI/CD

on:
  push:
    branches: [master]

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy API
        id: deploy
        run: |
          URL=$(vercel deploy --prod --cwd apps/api --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Fetch OpenAPI spec from deployed API
        run: |
          curl -f \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_SECRET }}" \
            "${{ needs.deploy-api.outputs.api_url }}/swagger/json" \
            -o apps/web/openapi.json

      - name: Generate Kubb types and hooks
        run: bun run --cwd apps/web generate
        env:
          API_URL: ${{ needs.deploy-api.outputs.api_url }}

      - name: Build web
        run: bun run --cwd apps/web build
        env:
          NEXT_PUBLIC_API_URL: ${{ needs.deploy-api.outputs.api_url }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Web
        run: vercel deploy --prod --cwd apps/web --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_UI }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID_UI }}
